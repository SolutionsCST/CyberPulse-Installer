apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: {{ .Values.redis.namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: {{ .Values.redis.image }}
          ports:
            - containerPort: 6379
          command:
            - redis-server
            - --requirepass
            - $(REDIS_PASSWORD)
            - --maxmemory
            - 400mb
            - --maxmemory-policy
            - noeviction
            - --save
            - ""
            - --appendonly
            - "no"
            - --rename-command
            - FLUSHALL
            - ""
            - --rename-command
            - FLUSHDB
            - ""
            - --rename-command
            - DEBUG
            - ""
            - --rename-command
            - CONFIG
            - ""
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-credentials
                  key: REDIS_PASSWORD
          resources:
            requests:
              memory: "256Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: {{ .Values.redis.namespace }}
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
