apiVersion: v1
kind: ServiceAccount
metadata:
  name: worker
  namespace: {{ .Values.worker.namespace }}
automountServiceAccountToken: false
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: {{ .Values.worker.namespace }}
spec:
  replicas: {{ .Values.worker.replicas }}
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      serviceAccountName: worker
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      {{- include "cyberpulse.imagePullSecrets" . | nindent 6 }}
      containers:
        - name: worker
          image: {{ include "cyberpulse.image" (list . "worker") }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          env:
            - name: PYTHONDONTWRITEBYTECODE
              value: "1"
            - name: REPORTS_DIR
              value: "/data/reports"
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: redis-credentials
                  key: REDIS_URL
          envFrom:
            - secretRef:
                name: postgres-credentials
            - secretRef:
                name: fetcher-encryption
          volumeMounts:
            - name: reports
              mountPath: /data/reports
            - name: tmp
              mountPath: /tmp
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              memory: {{ .Values.resources.worker.requests.memory | quote }}
              cpu: {{ .Values.resources.worker.requests.cpu | quote }}
            limits:
              memory: {{ .Values.resources.worker.limits.memory | quote }}
              cpu: {{ .Values.resources.worker.limits.cpu | quote }}
          livenessProbe:
            exec:
              command: ["arq", "--check", "worker.settings.WorkerSettings"]
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes:
        - name: reports
          persistentVolumeClaim:
            claimName: reports-pvc
        - name: tmp
          emptyDir: {}
