apiVersion: apps/v1
kind: Deployment
metadata:
  name: webapp
  namespace: {{ .Values.webapp.namespace }}
spec:
  replicas: {{ .Values.webapp.replicas }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: webapp
  template:
    metadata:
      labels:
        app: webapp
    spec:
      {{- include "cyberpulse.imagePullSecrets" . | nindent 6 }}
      containers:
        - name: webapp
          image: {{ include "cyberpulse.image" (list . "webapp") }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: webapp
  namespace: {{ .Values.webapp.namespace }}
spec:
  selector:
    app: webapp
  ports:
    - port: 80
      targetPort: 80
